name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Remove sensitive files before syncing
          rm -f .env
          rm -f config/google-credentials.json 2>/dev/null || true
          rm -f config/google-token.json 2>/dev/null || true
          rm -rf __pycache__ logs/ .cache 2>/dev/null || true
          
          # Add HF remote and force push
          git remote add hf https://user:${HF_TOKEN}@huggingface.co/spaces/ashishsankhua/Booking_Advisor_Voice_Agent
          git push hf main --force
          
          echo "✅ Sync complete - all files pushed to https://huggingface.co/spaces/ashishsankhua/Booking_Advisor_Voice_Agent"
