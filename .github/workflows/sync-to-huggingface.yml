name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          # Create temp workspace
          mkdir -p /tmp/hf_sync
          
          # Sync files to temp (exclude secrets and cache)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.gitattributes' \
            --exclude='.env' \
            --exclude='config/google-credentials.json' \
            --exclude='config/google-token.json' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.DS_Store' \
            --exclude='logs/' \
            --exclude='.cache' \
            ./ /tmp/hf_sync/

          # Clone HF Space fresh
          cd /tmp
          rm -rf hf_space
          git clone --depth 1 https://user:${HF_TOKEN}@huggingface.co/spaces/ashishsankhua/Booking_Advisor_Voice_Agent hf_space

          # Copy synced files into HF repo
          cp -r hf_sync/* hf_space/ 2>/dev/null || true
          cp -r hf_sync/.[!.]* hf_space/ 2>/dev/null || true

          # Commit and push to HF
          cd hf_space
          git add -A
          git diff --staged --quiet || git commit -m "Sync from GitHub: ${{ github.sha }}"
          git push
