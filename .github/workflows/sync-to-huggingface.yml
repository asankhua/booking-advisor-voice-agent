name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          # Clone HF Space to temp location
          cd /tmp
          rm -rf hf_space
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/ashishsankhua/Booking_Advisor_Voice_Agent hf_space
          
          # Clean everything except .git
          cd hf_space
          find . -not -path "./.git/*" -not -path "./.git" -delete 2>/dev/null || true
          
          # Copy ALL files from GitHub repo (excluding secrets)
          cd $GITHUB_WORKSPACE
          rsync -av --no-perms \
            --exclude='.git' \
            --exclude='.gitattributes' \
            --exclude='.env' \
            --exclude='config/google-credentials.json' \
            --exclude='config/google-token.json' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.DS_Store' \
            --exclude='logs/' \
            --exclude='.cache' \
            ./ /tmp/hf_space/

          # Commit and push to HF
          cd /tmp/hf_space
          git add -A
          git status
          git diff --staged --quiet || git commit -m "Sync from GitHub: ${{ github.sha }}"
          git push origin main
