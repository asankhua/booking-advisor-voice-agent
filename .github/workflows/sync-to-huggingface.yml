name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          # Clone HF Space
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/asankhua/advisor-voice-agent hf_space

          # Sync files (exclude secrets and cache)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='config/google-credentials.json' \
            --exclude='config/google-token.json' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.DS_Store' \
            --exclude='logs/*.log' \
            --exclude='logs/*.json' \
            --exclude='.cache' \
            ./ hf_space/

          # Commit and push to HF
          cd hf_space
          git add -A
          git diff --staged --quiet || git commit -m "Sync from GitHub: ${{ github.sha }}"
          git push
